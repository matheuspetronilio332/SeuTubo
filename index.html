<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>SeuTubo</title>
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <img src="./logo.svg" alt="Logo" style="width: 24px; height: 24px;">
                <span class="logo-text">SeuTubo</span>
            </div>
        </div>

        <div class="header-center">
            <div class="search-bar">
                <input type="text" placeholder="Pesquisar" id="searchInput" />
                <button class="search-btn">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>

        <div class="header-right">
            <button class="icon-btn" title="Criar">
                <i class="fas fa-plus-circle"></i>
                <span class="btn-label">Criar</span>
            </button>
            <button class="icon-btn notif-btn" title="Notificações">
                <i class="fas fa-bell"></i>
                <span class="notif-badge">9+</span>
            </button>
            <button class="avatar-btn" title="Seu canal">
                <span class="avatar-letter">P</span>
            </button>
            <button id="focusToggle" class="focus-btn" title="Modo Foco">
                <i class="fas fa-crosshairs"></i>
                <span class="btn-label">Foco</span>
            </button>
        </div>
    </header>

    <div class="layout">

        <!-- SIDEBAR -->
        <aside id="sidebar" class="sidebar">
            <div id="sidebarList" class="sidebar-list"></div>
            <div id="toggle-btn" class="toggle-btn">
                <i class="fas fa-chevron-left"></i>
            </div>

        </aside>

        <!-- CONTEÚDO -->
        <main id="content" class="content">
            <div class="video-grid" id="videoGrid"></div>
        </main>

    </div>

    <script src="script.js"></script>
</body>

</html>
